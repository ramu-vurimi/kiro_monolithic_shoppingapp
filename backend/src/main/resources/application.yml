spring:
  application:
    name: shop-inventory

  datasource:
    url: jdbc:mysql://localhost:3306/shopdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: password

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  mvc:
    cors:
      allowed-origins: "http://localhost:4200,http://localhost:3000"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true

logging:
  level:
    root: INFO
    com.example.shop: DEBUG

server:
  port: 8080

app:
  jwt:
    secret: "shop-inventory-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256"
